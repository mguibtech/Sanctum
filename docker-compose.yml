services:
  postgres:
    image: postgres:16-alpine
    container_name: sanctum-postgres
    environment:
      POSTGRES_DB: sanctum
      POSTGRES_USER: sanctum
      POSTGRES_PASSWORD: sanctum
    ports:
      - "55432:5432"
    volumes:
      - sanctum-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanctum -d sanctum"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanctum-redis
    ports:
      - "6379:6379"
    volumes:
      - sanctum-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sanctum-postgres-data:
  sanctum-redis-data:
